<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-top">
          <div class="brand-lockup">
            <svg class="brand-mark" viewBox="0 0 96 96" aria-hidden="true">
              <circle cx="48" cy="48" r="48" fill="#FF890A"></circle>
              <path d="M48 19L63 34.5C66.2 37.8 66.2 43.1 63 46.4L48 61L33 46.4C29.8 43.1 29.8 37.8 33 34.5L48 19Z" fill="#FFFFFF"></path>
              <path d="M24 55H44.5L38.5 74H18L24 55Z" fill="#FFFFFF"></path>
              <path d="M58 55H78L72 74H51.5L58 55Z" fill="#FFFFFF"></path>
              <circle cx="48" cy="48" r="8" fill="#CCFF00"></circle>
              <path d="M48 48L67 29" stroke="#333333" stroke-width="4" stroke-linecap="round"></path>
            </svg>
            <div>
              <h1>Citracker</h1>
              <p class="eyebrow">Citrea Mainnet Intelligence</p>
            </div>
          </div>
          <div class="hero-controls">
            <div class="live-pill">
              <span class="live-dot"></span>
              <span id="networkLiveLabel">Network panel polling</span>
            </div>
            <details class="source-dropdown">
              <summary class="source-toggle" aria-label="Live sources">
                <span class="source-toggle-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 3l8 4.5v9L12 21 4 16.5v-9L12 3Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"></path>
                    <path d="M12 8.2a3.8 3.8 0 1 1 0 7.6 3.8 3.8 0 0 1 0-7.6Z" fill="none" stroke="currentColor" stroke-width="1.8"></path>
                  </svg>
                </span>
                <span class="source-toggle-label">Sources</span>
              </summary>
              <div class="source-dropdown-panel">
              <div class="source-dropdown-head">
                  <h3>Sources</h3>
                </div>
                <div class="metric-list" id="sourceHealth"></div>
              </div>
            </details>
          </div>
        </div>

        <section class="gas-banner">
          <div class="gas-banner-head">
            <div>
              <h2>Citrea Gas Live</h2>
              <p class="subtle" id="gasLiveLabel">Gas polling every 60s</p>
            </div>
            <span class="subtle" id="gasPriceUpdatedAt">Awaiting explorer sync</span>
          </div>
          <div class="gas-banner-metrics" id="gasPriceMetrics"></div>
        </section>
      </header>

      <section class="split">
        <section class="panel left-panel">
          <div class="panel-head">
            <div>
              <h2>Wallet Tracker</h2>
              <p>Paste a wallet address to load all-time totals.</p>
            </div>
          </div>

          <section class="filters">
            <label>
              Wallet Address
              <input id="walletInput" type="text" placeholder="0x..." />
            </label>
            <button id="loadBtn">Load Wallet Data</button>
          </section>

          <section id="status" class="status"></section>
          <section id="bridgeSourceInfo" class="subtle bridge-source-info"></section>
          <section class="kpis" id="kpis"></section>
        </section>

        <aside class="panel right-panel">
          <div class="panel-head">
            <div>
              <h2>Citrea Mainnet Live</h2>
            </div>
            <div class="mini-meta">
              <span id="networkUpdatedAt">Waiting for first sync</span>
            </div>
          </div>

          <section id="networkStatus" class="status"></section>
          <section class="network-kpis" id="networkKpis"></section>

          <section class="card network-stack">
            <div class="section-head">
              <h3>Bridge Origins</h3>
            </div>
            <div class="metric-list" id="bridgeOrigins"></div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
