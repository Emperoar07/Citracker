<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-top">
          <div class="brand-lockup">
            <svg class="brand-wordmark" viewBox="0 0 1100 160" xmlns="http://www.w3.org/2000/svg" aria-label="Citracker logo">
              <defs>
                <linearGradient id="citrackerRadarGradient" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#FFB23A"></stop>
                  <stop offset="100%" stop-color="#FF7A00"></stop>
                </linearGradient>
              </defs>
              <circle cx="84" cy="80" r="46" fill="url(#citrackerRadarGradient)"></circle>
              <circle cx="84" cy="80" r="25" fill="none" stroke="#F5EEE2" stroke-opacity=".75" stroke-width="2"></circle>
              <circle cx="84" cy="80" r="15" fill="none" stroke="#F5EEE2" stroke-opacity=".45" stroke-width="2"></circle>
              <line x1="84" y1="80" x2="106" y2="64" stroke="#93CD3F" stroke-width="3" stroke-linecap="round"></line>
              <circle cx="106" cy="64" r="4" fill="#93CD3F"></circle>
              <text x="155" y="88" fill="#F5EEE2" font-size="72" font-weight="800" font-family="'Space Grotesk', 'IBM Plex Sans', sans-serif">Citracker</text>
              <text x="155" y="120" fill="#D8FF26" font-size="20" font-weight="700" letter-spacing="3" font-family="'IBM Plex Sans', sans-serif">CITREA WALLET TRACKER</text>
            </svg>
          </div>
        </div>
      </header>

      <section class="panel left-panel">
        <div class="panel-head">
          <div>
            <h2>Wallet Tracker</h2>
            <p>Paste a wallet address to load all-time totals.</p>
          </div>
        </div>

        <section class="filters">
          <label>
            Wallet Address
            <input id="walletInput" type="text" placeholder="0x..." />
          </label>
          <button id="loadBtn">Load Wallet Data</button>
        </section>

        <section id="status" class="status"></section>
        <section id="bridgeSourceInfo" class="subtle bridge-source-info"></section>
        <section class="kpis" id="kpis"></section>

        <details class="card card-dropdown wallet-balances-card">
          <summary class="card-dropdown-summary">
            <div class="section-head">
              <h3>Available Wallet Balances</h3>
              <span class="subtle">Exact live token balances</span>
            </div>
            <span class="card-dropdown-icon" aria-hidden="true"></span>
          </summary>
          <div class="card-dropdown-content">
            <div class="metric-list" id="walletBalances"></div>
          </div>
        </details>

        <section class="wallet-apps-grid">
          <details class="card card-dropdown wallet-apps-card">
            <summary class="card-dropdown-summary">
              <div class="section-head">
                <h3>Top Apps All-Time</h3>
                <span class="subtle">Top 3 apps across all wallet activity</span>
              </div>
              <span class="card-dropdown-icon" aria-hidden="true"></span>
            </summary>
            <div class="card-dropdown-content">
              <div class="metric-list" id="walletTopApps"></div>
            </div>
          </details>

          <details class="card card-dropdown wallet-apps-card">
            <summary class="card-dropdown-summary">
              <div class="section-head">
                <h3>Top Apps 24h</h3>
                <span class="subtle">Top 3 apps in the last 24 hours</span>
              </div>
              <span class="card-dropdown-icon" aria-hidden="true"></span>
            </summary>
            <div class="card-dropdown-content">
              <div class="metric-list" id="walletTopApps24h"></div>
            </div>
          </details>
        </section>
      </section>

      <footer class="site-credit">
        <span>Built by </span>
        <a href="https://x.com/emperoar007" target="_blank" rel="noreferrer">0XB</a>
      </footer>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
