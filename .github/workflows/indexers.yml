name: Indexers

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: citracker-indexers
  cancel-in-progress: false

env:
  NODE_VERSION: 22
  NPM_CI_RETRIES: 3

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      CITREA_RPC_URL: ${{ secrets.CITREA_RPC_URL }}
      START_BLOCK_ETH: ${{ secrets.START_BLOCK_ETH }}
      START_BLOCK_CITREA: ${{ secrets.START_BLOCK_CITREA }}
      INDEXER_CHUNK_SIZE: ${{ secrets.INDEXER_CHUNK_SIZE }}
      RPC_MAX_LOG_RANGE: ${{ secrets.RPC_MAX_LOG_RANGE }}
      RPC_HEAD_BUFFER_BLOCKS: ${{ secrets.RPC_HEAD_BUFFER_BLOCKS }}
      INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.INDEXER_MAX_RANGES_PER_STREAM }}
      INDEXER_MAX_PENDING_ITEMS: ${{ secrets.INDEXER_MAX_PENDING_ITEMS }}
      DEX_INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.DEX_INDEXER_MAX_RANGES_PER_STREAM }}
      DEX_INDEXER_MAX_PENDING_ITEMS: ${{ secrets.DEX_INDEXER_MAX_PENDING_ITEMS }}
      PRICING_BATCH_SIZE: ${{ secrets.PRICING_BATCH_SIZE }}
      COINGECKO_API_BASE: ${{ secrets.COINGECKO_API_BASE }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in $(seq 1 "$NPM_CI_RETRIES"); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$NPM_CI_RETRIES" ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            echo "npm ci failed on attempt $attempt, retrying..." >&2
            sleep $((attempt * 5))
          done

      - name: Bootstrap database
        run: npm run db:bootstrap

  bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - bootstrap
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      CITREA_RPC_URL: ${{ secrets.CITREA_RPC_URL }}
      START_BLOCK_ETH: ${{ secrets.START_BLOCK_ETH }}
      START_BLOCK_CITREA: ${{ secrets.START_BLOCK_CITREA }}
      INDEXER_CHUNK_SIZE: ${{ secrets.INDEXER_CHUNK_SIZE }}
      RPC_MAX_LOG_RANGE: ${{ secrets.RPC_MAX_LOG_RANGE }}
      RPC_HEAD_BUFFER_BLOCKS: ${{ secrets.RPC_HEAD_BUFFER_BLOCKS }}
      INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.INDEXER_MAX_RANGES_PER_STREAM }}
      INDEXER_MAX_PENDING_ITEMS: ${{ secrets.INDEXER_MAX_PENDING_ITEMS }}
      DEX_INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.DEX_INDEXER_MAX_RANGES_PER_STREAM }}
      DEX_INDEXER_MAX_PENDING_ITEMS: ${{ secrets.DEX_INDEXER_MAX_PENDING_ITEMS }}
      PRICING_BATCH_SIZE: ${{ secrets.PRICING_BATCH_SIZE }}
      COINGECKO_API_BASE: ${{ secrets.COINGECKO_API_BASE }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in $(seq 1 "$NPM_CI_RETRIES"); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$NPM_CI_RETRIES" ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            echo "npm ci failed on attempt $attempt, retrying..." >&2
            sleep $((attempt * 5))
          done

      - name: Run bridge indexer
        run: npm run indexer:bridge

  dex:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - bootstrap
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      CITREA_RPC_URL: ${{ secrets.CITREA_RPC_URL }}
      START_BLOCK_ETH: ${{ secrets.START_BLOCK_ETH }}
      START_BLOCK_CITREA: ${{ secrets.START_BLOCK_CITREA }}
      INDEXER_CHUNK_SIZE: ${{ secrets.INDEXER_CHUNK_SIZE }}
      RPC_MAX_LOG_RANGE: ${{ secrets.RPC_MAX_LOG_RANGE }}
      RPC_HEAD_BUFFER_BLOCKS: ${{ secrets.RPC_HEAD_BUFFER_BLOCKS }}
      INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.INDEXER_MAX_RANGES_PER_STREAM }}
      INDEXER_MAX_PENDING_ITEMS: ${{ secrets.INDEXER_MAX_PENDING_ITEMS }}
      DEX_INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.DEX_INDEXER_MAX_RANGES_PER_STREAM }}
      DEX_INDEXER_MAX_PENDING_ITEMS: ${{ secrets.DEX_INDEXER_MAX_PENDING_ITEMS }}
      PRICING_BATCH_SIZE: ${{ secrets.PRICING_BATCH_SIZE }}
      COINGECKO_API_BASE: ${{ secrets.COINGECKO_API_BASE }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in $(seq 1 "$NPM_CI_RETRIES"); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$NPM_CI_RETRIES" ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            echo "npm ci failed on attempt $attempt, retrying..." >&2
            sleep $((attempt * 5))
          done

      - name: Run dex indexer
        run: npm run indexer:dex

  fees:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - bootstrap
      - bridge
      - dex
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      CITREA_RPC_URL: ${{ secrets.CITREA_RPC_URL }}
      START_BLOCK_ETH: ${{ secrets.START_BLOCK_ETH }}
      START_BLOCK_CITREA: ${{ secrets.START_BLOCK_CITREA }}
      INDEXER_CHUNK_SIZE: ${{ secrets.INDEXER_CHUNK_SIZE }}
      RPC_MAX_LOG_RANGE: ${{ secrets.RPC_MAX_LOG_RANGE }}
      RPC_HEAD_BUFFER_BLOCKS: ${{ secrets.RPC_HEAD_BUFFER_BLOCKS }}
      INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.INDEXER_MAX_RANGES_PER_STREAM }}
      INDEXER_MAX_PENDING_ITEMS: ${{ secrets.INDEXER_MAX_PENDING_ITEMS }}
      DEX_INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.DEX_INDEXER_MAX_RANGES_PER_STREAM }}
      DEX_INDEXER_MAX_PENDING_ITEMS: ${{ secrets.DEX_INDEXER_MAX_PENDING_ITEMS }}
      PRICING_BATCH_SIZE: ${{ secrets.PRICING_BATCH_SIZE }}
      COINGECKO_API_BASE: ${{ secrets.COINGECKO_API_BASE }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in $(seq 1 "$NPM_CI_RETRIES"); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$NPM_CI_RETRIES" ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            echo "npm ci failed on attempt $attempt, retrying..." >&2
            sleep $((attempt * 5))
          done

      - name: Run fee indexer
        run: npm run indexer:fees

  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - bootstrap
      - bridge
      - dex
      - fees
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
      CITREA_RPC_URL: ${{ secrets.CITREA_RPC_URL }}
      START_BLOCK_ETH: ${{ secrets.START_BLOCK_ETH }}
      START_BLOCK_CITREA: ${{ secrets.START_BLOCK_CITREA }}
      INDEXER_CHUNK_SIZE: ${{ secrets.INDEXER_CHUNK_SIZE }}
      RPC_MAX_LOG_RANGE: ${{ secrets.RPC_MAX_LOG_RANGE }}
      RPC_HEAD_BUFFER_BLOCKS: ${{ secrets.RPC_HEAD_BUFFER_BLOCKS }}
      INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.INDEXER_MAX_RANGES_PER_STREAM }}
      INDEXER_MAX_PENDING_ITEMS: ${{ secrets.INDEXER_MAX_PENDING_ITEMS }}
      DEX_INDEXER_MAX_RANGES_PER_STREAM: ${{ secrets.DEX_INDEXER_MAX_RANGES_PER_STREAM }}
      DEX_INDEXER_MAX_PENDING_ITEMS: ${{ secrets.DEX_INDEXER_MAX_PENDING_ITEMS }}
      PRICING_BATCH_SIZE: ${{ secrets.PRICING_BATCH_SIZE }}
      COINGECKO_API_BASE: ${{ secrets.COINGECKO_API_BASE }}
      COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in $(seq 1 "$NPM_CI_RETRIES"); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq "$NPM_CI_RETRIES" ]; then
              echo "npm ci failed after $attempt attempts" >&2
              exit 1
            fi
            echo "npm ci failed on attempt $attempt, retrying..." >&2
            sleep $((attempt * 5))
          done

      - name: Run price indexer
        run: npm run indexer:prices
